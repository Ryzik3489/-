<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Pixel - Beta Status</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }

        .container {
            padding: 20px;
            border: 1px solid #2c2f33;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #f0f6fc;
        }

        p {
            color: #8b949e;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background-color: #2ea043;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .version {
            margin-top: 20px;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Бета обновлений пока нет</h1>
        <p>Мы работаем над новыми фишками. Загляните позже!</p>
        
        <a href="https://world-pixel-ten.vercel.app/" class="btn">Вернуться на главный холст</a>
        
        <div class="version">World Pixel Build: 2026.3</div>
    </div>

</body>
</html>
