<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel | TEST SERVER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; background: #1a1a2e; 
            font-family: 'Segoe UI', sans-serif; touch-action: none;
        }
        canvas { display: block; image-rendering: pixelated; }

        /* ИНТЕРФЕЙС */
        #ui-top { position: fixed; top: 10px; left: 10px; right: 10px; pointer-events: none; z-index: 1000; display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; }
        .panel { 
            background: rgba(255, 255, 255, 0.95); padding: 6px 12px; border-radius: 10px;
            pointer-events: auto; font-size: 12px; font-weight: bold; display: flex; gap: 10px; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #4285F4;
        }

        /* КВЕСТЫ И РАНГ */
        #quest-panel { position: fixed; top: 70px; right: 10px; width: 180px; }
        .quest-item { font-size: 11px; margin-top: 5px; color: #444; }
        .done { text-decoration: line-through; color: #888; }
        .rank-tag { color: #e94560; text-transform: uppercase; font-size: 10px; margin-left: 5px; }

        /* ЧАТ */
        #chat-container { position: fixed; bottom: 20px; left: 10px; width: 300px; pointer-events: auto; z-index: 1000; }
        #chat-history { 
            max-height: 180px; overflow-y: auto; background: rgba(255,255,255,0.98); 
            border-radius: 12px; margin-bottom: 8px; padding: 10px; display: none; border: 1px solid #ddd;
        }
        #chat-messages { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; pointer-events: none; }
        
        .msg { background: white; padding: 6px 10px; border-radius: 8px; font-size: 12px; animation: fO 7s forwards; border-left: 4px solid #4285F4; }
        .system-msg { background: rgba(0,0,0,0.7) !important; color: #00ffcc !important; border-left: 4px solid #00ffcc !important; font-style: italic; }
        
        #chat-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; outline: none; }
        #cooldown { position: fixed; bottom: 0; left: 0; height: 3px; background: #00ffcc; width: 0%; z-index: 1001; }
        @keyframes fO { 0% { opacity: 0; transform: scale(0.9); } 10%, 90% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: translateX(-20px); } }
    </style>
</head>
<body>
    <div id="cooldown"></div>
    <div id="ui-top">
        <div class="panel">
            <input type="color" id="colorPicker" value="#4285F4" style="width:25px;height:25px;">
            <span id="rank-display">РАНГ: НОВИЧОК</span>
        </div>
        <div class="panel">НИК: <input type="text" id="nick-input" style="width:70px; border:none; color:#4285F4; font-weight:bold;"></div>
        <div class="panel">ОНЛАЙН: <span id="online">1</span></div>
    </div>

    <div id="quest-panel" class="panel" style="flex-direction: column; align-items: flex-start;">
        <div style="color:#e94560">КВЕСТЫ:</div>
        <div id="q1" class="quest-item">• Поставь 10 пикселей (<span id="q1-val">0</span>/10)</div>
        <div id="q2" class="quest-item">• Напиши в чат (<span id="q2-val">0</span>/1)</div>
    </div>
    
    <div id="chat-container">
        <div id="chat-history"></div>
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Введите сообщение..." maxlength="60">
    </div>

    <canvas id="canvas"></canvas>

<script>
    // ТЕСТОВАЯ БАЗА ДАННЫХ (Замени на свою вторую, если есть, или используй эту)
    const firebaseConfig = {
        apiKey: "AIzaSyCWfc3TzdVLaiwOhUrEfDaGsEHrUInzuJM",
        databaseURL: "https://doodle-102-default-rtdb.firebaseio.com" // Это твоя текущая, для теста создай вторую в консоли Firebase
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ПРОГРЕСС И РАНГИ
    let pixelsPlaced = parseInt(localStorage.getItem('wp_pixels')) || 0;
    let chatSent = parseInt(localStorage.getItem('wp_chat')) || 0;
    let userName = localStorage.getItem('worldpixel_name') || "Игрок_" + Math.floor(Math.random()*99);
    
    function updateRank() {
        let rank = "Новичок";
        if (pixelsPlaced > 50) rank = "Художник";
        if (pixelsPlaced > 200) rank = "Мастер";
        if (pixelsPlaced > 1000) rank = "Легенда";
        document.getElementById('rank-display').innerText = "РАНГ: " + rank;
        
        // Обновление квестов
        if(pixelsPlaced >= 10) document.getElementById('q1').classList.add('done');
        document.getElementById('q1-val').innerText = Math.min(pixelsPlaced, 10);
        if(chatSent >= 1) document.getElementById('q2').classList.add('done');
        document.getElementById('q2-val').innerText = Math.min(chatSent, 1);
    }

    const nickInput = document.getElementById('nick-input');
    nickInput.value = userName;
    nickInput.onchange = () => { userName = nickInput.value; localStorage.setItem('worldpixel_name', userName); };

    // СИСТЕМА ВХОДА/ВЫХОДА
    const myStatusRef = db.ref('presence').push();
    db.ref('.info/connected').on('value', snap => {
        if (snap.val()) {
            myStatusRef.set({ name: userName, status: 'online' });
            myStatusRef.onDisconnect().remove();
            // Отправляем в чат инфо о входе
            db.ref('chat').push({ system: true, msg: `${userName} вошел в игру! 🌟`, t: Date.now() });
        }
    });

    // Когда кто-то выходит (удаляется из presence)
    db.ref('presence').on('child_removed', snap => {
        const user = snap.val();
        db.ref('chat').push({ system: true, msg: `${user.name} покинул нас... 👤`, t: Date.now() });
    });

    // ХОЛСТ И УПРАВЛЕНИЕ
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas'), wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;
    world.width = world.height = W_SIZE; 
    wctx.fillStyle = "#ffffff"; wctx.fillRect(0,0,W_SIZE,W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 }, lastDraw = 0;

    db.ref('canvas').on('child_added', s => { const p = s.val(); wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); });
    db.ref('canvas').on('child_changed', s => { const p = s.val(); wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1); });
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren() || 1);

    // ЧАТ С РАНГАМИ
    const chatIn = document.getElementById('chat-input'), chatHist = document.getElementById('chat-history'), chatMsgs = document.getElementById('chat-messages');
    chatIn.onfocus = () => { chatHist.style.display = 'block'; chatHist.scrollTop = chatHist.scrollHeight; };
    
    chatIn.onkeydown = e => {
        if (e.key === 'Enter' && chatIn.value.trim()) {
            chatSent++; localStorage.setItem('wp_chat', chatSent);
            updateRank();
            db.ref('chat').push({ name: userName, msg: chatIn.value.trim(), rank: document.getElementById('rank-display').innerText.split(': ')[1] });
            chatIn.value = '';
        }
    };

    db.ref('chat').limitToLast(30).on('child_added', s => {
        const d = s.val();
        const m = document.createElement('div');
        if (d.system) {
            m.className = 'msg system-msg';
            m.innerText = d.msg;
        } else {
            m.className = 'msg';
            m.innerHTML = `<span class="rank-tag">[${d.rank || "Новичок"}]</span> <b>${d.name}:</b> ${d.msg}`;
            const h = document.createElement('div'); h.innerHTML = m.innerHTML; h.style.fontSize="11px"; h.style.borderBottom="1px solid #eee";
            chatHist.appendChild(h); chatHist.scrollTop = chatHist.scrollHeight;
        }
        chatMsgs.appendChild(m); setTimeout(() => m.remove(), 6500);
    });

    function getP(cx, cy) { return { x: Math.floor((cx-offset.x)/zoom + W_SIZE/2), y: Math.floor((cy-offset.y)/zoom + W_SIZE/2) }; }
    function send(x, y) {
        if(Date.now()-lastDraw < 500 || x<0 || x>=W_SIZE || y<0 || y>=W_SIZE) return;
        lastDraw = Date.now();
        pixelsPlaced++; localStorage.setItem('wp_pixels', pixelsPlaced);
        updateRank();
        db.ref('canvas/'+x+'_'+y).set({x, y, color: document.getElementById('colorPicker').value});
        const b = document.getElementById('cooldown'); b.style.transition='none'; b.style.width='100%';
        setTimeout(()=>{ b.style.transition='width 500ms linear'; b.style.width='0%'; }, 20);
    }

    // ЛОГИКА МЫШИ/ТАЧА (упрощенно)
    let isPan = false, lastT = {x:0, y:0}, startT = {x:0, y:0}, startTime = 0;
    window.oncontextmenu = e => e.preventDefault();
    canvas.onmousedown = e => { if(e.button===0) send(getP(e.clientX,e.clientY).x, getP(e.clientX,e.clientY).y); else isPan=true; };
    window.onmousemove = e => { if(isPan){ offset.x+=e.movementX; offset.y+=e.movementY; } };
    window.onmouseup = () => isPan=false;
    window.onwheel = e => { const oldZ = zoom; zoom *= (e.deltaY < 0 ? 1.1 : 0.9); zoom = Math.max(0.1, Math.min(80, zoom)); offset.x = e.clientX - (e.clientX - offset.x) * (zoom/oldZ); offset.y = e.clientY - (e.clientY - offset.y) * (zoom/oldZ); };

    function render() {
        canvas.width=window.innerWidth; canvas.height=window.innerHeight; ctx.imageSmoothingEnabled=false;
        ctx.fillStyle="#1a1a2e"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save(); ctx.translate(offset.x, offset.y); ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        ctx.restore(); requestAnimationFrame(render);
    } 
    updateRank();
    render();
</script>
</body>
</html>
