<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; image-rendering: pixelated; }
        
        /* UI в стиле минимализм */
        #ui { position: fixed; top: 15px; left: 15px; right: 15px; pointer-events: none; display: flex; justify-content: space-between; z-index: 100; }
        .panel { 
            background: rgba(0,0,0,0.0); 
            border: 1px solid #333; 
            padding: 6px 10px; 
            color: #0f0; 
            pointer-events: auto; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-radius: 2px; 
            font-size: 12px;
            letter-spacing: 1px;
        }
        
        /* ЧАТ МИНИМАЛ */
        #chat-container { position: fixed; bottom: 15px; left: 15px; width: 250px; pointer-events: auto; z-index: 1000; }
        #chat-input { 
            width: 100%; 
            background: rgba(0,0,0,0.8); 
            border: 1px solid #333; 
            color: #fff; 
            padding: 8px; 
            outline: none; 
            font-family: monospace;
            font-size: 12px;
        }
        #chat-messages { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; pointer-events: none; }
        .msg { color: #aaa; font-size: 11px; animation: fadeOut 5s forwards; }

        input[type="color"] { width: 24px; height: 24px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; }
        #cooldown { position: fixed; bottom: 0; left: 0; height: 2px; background: #0f0; width: 0%; z-index: 1001; }
        
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="cooldown"></div>

    <div id="ui">
        <div class="panel">
            <input type="color" id="colorPicker" value="#00ff00">
            <span id="coords">0,0</span>
        </div>
        <div class="panel">ONLINE: <span id="online">1</span></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="type message..." maxlength="50">
    </div>

    <canvas id="canvas"></canvas>

<script>
    // Тестовый сервер
    const firebaseConfig = {
        apiKey: "AIzaSyAbBIPW5RaaBQYBmlXhVVBV0606QKBvJng",
        authDomain: "telega-85cca.firebaseapp.com",
        databaseURL: "https://telega-85cca-default-rtdb.firebaseio.com",
        projectId: "telega-85cca",
        storageBucket: "telega-85cca.firebasestorage.app",
        messagingSenderId: "213088586635",
        appId: "1:213088586635:web:5ee9a8985a9fb5403f7d8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas');
    const wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;

    world.width = world.height = W_SIZE;
    wctx.fillStyle = "#FFFFFF";
    wctx.fillRect(0, 0, W_SIZE, W_SIZE);

    let zoom = 8.0, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };
    let lastDraw = 0;
    const CD_TIME = 500;

    // ЧАТ
    const chatInput = document.getElementById('chat-input');
    const chatMessages = document.getElementById('chat-messages');

    chatInput.onkeydown = e => {
        if(e.key === 'Enter' && chatInput.value.trim() !== '') {
            db.ref('chat').push({ msg: chatInput.value, t: Date.now() });
            chatInput.value = '';
        }
    };

    db.ref('chat').limitToLast(3).on('child_added', s => {
        const d = s.val();
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerText = `> ${d.msg}`;
        chatMessages.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    });

    // ОТКЛЮЧЕНИЕ КОНТЕКСТНОГО МЕНЮ (ПРАВАЯ КНОПКА ТЕПЕРЬ ТОЛЬКО ДЛЯ ДВИЖЕНИЯ)
    window.oncontextmenu = e => e.preventDefault();

    // СИНХРОНИЗАЦИЯ
    db.ref('canvas').on('child_added', s => drawToBuffer(s.val()));
    db.ref('canvas').on('child_changed', s => drawToBuffer(s.val()));
    
    const onlineRef = db.ref('presence').push(true);
    onlineRef.onDisconnect().remove();
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren());

    function drawToBuffer(p) {
        if(!p) return;
        wctx.fillStyle = p.color;
        wctx.fillRect(p.x, p.y, 1, 1);
    }

    function sendPixel(x, y) {
        const now = Date.now();
        if(now - lastDraw < CD_TIME || x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;
        lastDraw = now;
        const color = document.getElementById('colorPicker').value;
        const bar = document.getElementById('cooldown');
        bar.style.transition = 'none'; bar.style.width = '100%';
        db.ref('canvas/' + x + '_' + y).set({ x, y, color });
        setTimeout(() => { bar.style.transition = `width ${CD_TIME}ms linear`; bar.style.width = '0%'; }, 20);
    }

    // УПРАВЛЕНИЕ
    let isDraw = false, isPan = false;
    function getP(cx, cy) {
        return {
            x: Math.floor((cx - offset.x) / zoom + W_SIZE/2),
            y: Math.floor((cy - offset.y) / zoom + W_SIZE/2)
        };
    }

    canvas.onmousedown = e => { 
        if(e.button === 0) { isDraw = true; const p = getP(e.clientX, e.clientY); sendPixel(p.x, p.y); } 
        else if(e.button === 2) isPan = true; // ПРАВАЯ КНОПКА = ТОЛЬКО ДВИЖЕНИЕ
    };
    
    window.onmousemove = e => {
        const p = getP(e.clientX, e.clientY);
        document.getElementById('coords').innerText = `${p.x},${p.y}`;
        if(isDraw) sendPixel(p.x, p.y);
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };
    
    window.onmouseup = () => isDraw = isPan = false;
    window.onwheel = e => { zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.1), 80); };

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.imageSmoothingEnabled = false;
        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.save();
        ctx.translate(offset.x, offset.y); ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        
        // Тонкая сетка при сильном зуме
        if(zoom > 20) {
            ctx.beginPath(); ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 0.05;
            for(let x=0; x<=W_SIZE; x++) { ctx.moveTo(x-W_SIZE/2, -W_SIZE/2); ctx.lineTo(x-W_SIZE/2, W_SIZE/2); }
            for(let y=0; y<=W_SIZE; y++) { ctx.moveTo(-W_SIZE/2, y-W_SIZE/2); ctx.lineTo(W_SIZE/2, y-W_SIZE/2); }
            ctx.stroke();
        }
        ctx.restore();
        requestAnimationFrame(render);
    }
    render();
</script>
</body>
</html>
