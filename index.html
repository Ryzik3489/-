<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Pixel</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f2f5; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; touch-action: none; background: #fff; }
        
        .ui-element { 
            pointer-events: auto; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px); border-radius: 18px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3);
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #top-info { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 100; display: flex; align-items: center; gap: 15px; padding: 8px 20px; 
        }
        #coords { font-size: 14px; font-weight: 600; color: #444; min-width: 120px; }
        input[type="color"] { border: none; width: 32px; height: 32px; cursor: pointer; background: none; border-radius: 50%; }

        /* КВЕСТЫ */
        #quest-container { position: fixed; top: 80px; right: 20px; z-index: 100; text-align: right; }
        #quest-menu { width: 240px; padding: 15px; margin-bottom: 10px; display: none; text-align: left; }
        #quest-toggle { 
            padding: 10px 20px; border-radius: 25px; border: none; 
            background: #2ea043; color: white; font-weight: bold; cursor: pointer;
        }
        .progress-bar { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: #2ea043; width: 0%; transition: 0.3s; }

        /* ЧАТ */
        #chat-container { position: fixed; bottom: 20px; left: 20px; z-index: 100; width: 300px; pointer-events: none; }
        #chat-messages { height: 120px; overflow: hidden; display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        #chat-history { 
            position: absolute; bottom: 60px; left: 0; width: 100%; height: 250px; 
            display: none; overflow-y: auto; padding: 15px; pointer-events: auto;
        }
        #chat-input { 
            width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd;
            outline: none; pointer-events: auto; font-size: 14px;
        }
        .msg-line { margin-bottom: 5px; font-size: 13px; color: #333; }
        .rank-tag { color: #d4a017; font-weight: bold; margin-right: 5px; }
        .msg-pop { background: white; padding: 5px 12px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="top-info" class="ui-element">
    <input type="color" id="colorPicker" value="#000000">
    <div id="coords">Загрузка...</div>
    <input type="text" id="nick-input" placeholder="Ник" style="width: 80px; border: none; background: #f0f0f0; padding: 5px 10px; border-radius: 10px;">
    <div style="color: #2ea043; font-weight: bold;">● <span id="online">1</span></div>
</div>

<div id="quest-container">
    <div id="quest-menu" class="ui-element">
        <b id="q-title">Задание</b>
        <div id="q-desc" style="font-size: 12px; color: #666;">Рисуй пиксели!</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-stats" style="font-size: 11px;">0 / 0</div>
    </div>
    <button id="quest-toggle" onclick="toggleQuests()">📜 ЗАДАНИЯ</button>
</div>

<div id="chat-container">
    <div id="chat-messages"></div>
    <div id="chat-history" class="ui-element"></div>
    <input type="text" id="chat-input" placeholder="Напиши что-нибудь...">
</div>

<canvas id="canvas"></canvas>

<script>
    // --- КОНФИГУРАЦИЯ ---
    const firebaseConfig = {
        apiKey: "AIzaSyAbBIPW5RaaBQYBmlXhVVBV0606QKBvJng",
        authDomain: "telega-85cca.firebaseapp.com",
        databaseURL: "https://telega-85cca-default-rtdb.firebaseio.com",
        projectId: "telega-85cca",
        storageBucket: "telega-85cca.firebasestorage.app",
        messagingSenderId: "213088586635",
        appId: "1:213088586635:web:5ee9a8985a9fb5403f7d8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- ПЕРЕМЕННЫЕ ---
    let userXP = parseInt(localStorage.getItem('wp_xp')) || 0;
    let userName = localStorage.getItem('worldpixel_name') || "Игрок_" + Math.floor(Math.random() * 99);
    let curX = 0, curY = 0, lastDraw = 0;
    const pageLoadTime = Date.now();

    document.getElementById('nick-input').value = userName;
    document.getElementById('nick-input').onchange = (e) => {
        userName = e.target.value || "Аноним";
        localStorage.setItem('worldpixel_name', userName);
    };

    const getRank = (xp) => {
        if (xp >= 5000) return "[ЛЕГЕНДА]";
        if (xp >= 200) return "[МАСТЕР]";
        return "[НОВИЧОК]";
    };

    // --- КВЕСТЫ ---
    let quest = { target: 5, progress: 0, active: true };
    function toggleQuests() {
        const m = document.getElementById('quest-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function updateQuestUI() {
        document.getElementById('progress-fill').style.width = (quest.progress / quest.target * 100) + "%";
        document.getElementById('q-stats').innerText = `${quest.progress} / ${quest.target} (Награда: 50 XP)`;
        document.getElementById('coords').innerText = `${curX}, ${curY} | ${userXP} XP`;
    }

    // --- ЧАТ ---
    const chatIn = document.getElementById('chat-input');
    const chatHist = document.getElementById('chat-history');
    const chatMsgs = document.getElementById('chat-messages');

    chatIn.onfocus = () => { chatHist.style.display = 'block'; chatHist.scrollTop = chatHist.scrollHeight; };
    
    chatIn.onkeydown = (e) => {
        if (e.key === 'Enter' && chatIn.value.trim()) {
            db.ref('chat').push({
                name: userName,
                rank: getRank(userXP),
                msg: chatIn.value,
                t: firebase.database.ServerValue.TIMESTAMP
            });
            chatIn.value = '';
        }
    };

    db.ref('chat').limitToLast(20).on('child_added', (s) => {
        const d = s.val();
        const html = `<div class="msg-line"><span class="rank-tag">${d.rank}</span><b>${d.name}:</b> ${d.msg}</div>`;
        chatHist.innerHTML += html;
        chatHist.scrollTop = chatHist.scrollHeight;

        if (d.t > pageLoadTime - 1000) {
            const pop = document.createElement('div');
            pop.className = 'msg-pop';
            pop.innerHTML = html;
            chatMsgs.appendChild(pop);
            setTimeout(() => pop.remove(), 5000);
        }
    });

    // --- ОНЛАЙН ---
    const myRef = db.ref('presence').push();
    myRef.set({ name: userName, t: pageLoadTime });
    myRef.onDisconnect().remove();
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren());

    // --- ХОЛСТ ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas');
    const wctx = world.getContext('2d', { alpha: false });
    const W_SIZE = 2000;
    world.width = world.height = W_SIZE;
    wctx.fillStyle = "white"; wctx.fillRect(0,0,W_SIZE,W_SIZE);

    let zoom = 10, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };

    db.ref('canvas').on('child_added', s => {
        const p = s.val();
        wctx.fillStyle = p.color;
        wctx.fillRect(p.x, p.y, 1, 1);
    });

    function getP(cx, cy) {
        return {
            x: Math.floor((cx - offset.x) / zoom + W_SIZE / 2),
            y: Math.floor((cy - offset.y) / zoom + W_SIZE / 2)
        };
    }

    function drawPixel(x, y) {
        if (Date.now() - lastDraw < 300) return;
        if (x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;
        lastDraw = Date.now();
        db.ref('canvas/' + x + '_' + y).set({ x, y, color: document.getElementById('colorPicker').value });
        
        userXP += 1;
        localStorage.setItem('wp_xp', userXP);
        if (quest.active) {
            quest.progress++;
            if (quest.progress >= quest.target) {
                userXP += 50; quest.progress = 0;
                alert("Квест выполнен! +50 XP");
            }
        }
        updateQuestUI();
    }

    // УПРАВЛЕНИЕ
    let isPan = false;
    canvas.onmousedown = e => {
        const p = getP(e.clientX, e.clientY);
        if (e.button === 0) drawPixel(p.x, p.y);
        else isPan = true;
        chatHist.style.display = 'none';
    };
    window.onmousemove = e => {
        const p = getP(e.clientX, e.clientY);
        curX = p.x; curY = p.y; updateQuestUI();
        if (isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };
    window.onmouseup = () => isPan = false;
    window.oncontextmenu = e => e.preventDefault();
    window.onwheel = e => {
        const oldZ = zoom;
        zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.5), 50);
        offset.x = e.clientX - (e.clientX - offset.x) * (zoom / oldZ);
        offset.y = e.clientY - (e.clientY - offset.y) * (zoom / oldZ);
    };

    function render() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = "#f0f2f5"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.imageSmoothingEnabled = false;
        ctx.save();
        ctx.translate(offset.x, offset.y);
        ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2);
        ctx.restore();
        requestAnimationFrame(render);
    }
    render();
    updateQuestUI();
</script>
</body>
</html>
