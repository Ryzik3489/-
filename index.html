<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Pixel - No Alerts Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eef2f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { display: block; touch-action: none; background: #ffffff; }
        
        /* СТИЛЬ ИНТЕРФЕЙСА */
        .ui-card { 
            pointer-events: auto; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.4);
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        #top-bar { 
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 100; display: flex; align-items: center; gap: 15px; padding: 10px 25px; 
        }
        #stats { font-size: 14px; font-weight: 600; color: #334155; }
        input[type="color"] { border: none; width: 34px; height: 34px; cursor: pointer; background: none; border-radius: 50%; }

        /* КВЕСТЫ */
        #quest-box { position: fixed; top: 85px; right: 20px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        #quest-window { width: 250px; padding: 18px; margin-bottom: 12px; display: none; }
        #quest-btn { 
            padding: 12px 24px; border-radius: 30px; border: none; 
            background: #10b981; color: white; font-weight: bold; cursor: pointer;
        }

        /* ЧАТ */
        #chat-zone { position: fixed; bottom: 20px; left: 20px; z-index: 100; width: 320px; pointer-events: none; }
        #chat-logs { height: 130px; overflow: hidden; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        #chat-input-box { 
            width: 100%; padding: 14px 22px; border-radius: 30px; border: 1px solid #e2e8f0;
            outline: none; pointer-events: auto; font-size: 14px; background: white;
        }
        #chat-full-history { 
            position: absolute; bottom: 70px; left: 0; width: 100%; height: 280px; 
            display: none; overflow-y: auto; padding: 18px; pointer-events: auto;
        }

        /* УВЕДОМЛЕНИЕ СНИЗУ */
        #notify-container {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            z-index: 1000; pointer-events: none; display: flex; flex-direction: column; gap: 10px;
        }
        .notify {
            background: white; color: #1a1a1a; padding: 12px 25px; border-radius: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15); font-weight: 600;
            animation: notifyAnim 3s forwards; border-left: 5px solid #10b981;
        }
        @keyframes notifyAnim {
            0% { opacity: 0; transform: translateY(20px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        .tag { color: #f59e0b; font-weight: 800; font-size: 10px; margin-right: 6px; }
        .progress { width: 100%; height: 8px; background: #f1f5f9; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        #bar-fill { height: 100%; background: #10b981; width: 0%; transition: 0.4s; }
    </style>
</head>
<body>

<div id="top-bar" class="ui-card">
    <input type="color" id="picker" value="#000000">
    <div id="stats">Подключение...</div>
    <input type="text" id="nick" placeholder="Ник" style="width: 80px; border: none; background: #f1f5f9; padding: 5px 10px; border-radius: 10px;">
    <div style="color: #10b981; font-weight: 800;">● <span id="count">1</span></div>
</div>

<div id="quest-box">
    <div id="quest-window" class="ui-card">
        <b>Задание</b>
        <div id="q-text" style="font-size: 12px; color: #64748b;">Ставь пиксели!</div>
        <div class="progress"><div id="bar-fill"></div></div>
        <div id="q-info" style="font-size: 11px; color: #10b981;">0 / 10</div>
    </div>
    <button id="quest-btn" onclick="toggleQ()">📜 ЗАДАНИЯ</button>
</div>

<div id="notify-container"></div>

<div id="chat-zone">
    <div id="chat-logs"></div>
    <div id="chat-full-history" class="ui-card"></div>
    <input type="text" id="chat-input-box" placeholder="Чат...">
</div>

<canvas id="canvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
    import { getDatabase, ref, set, push, onChildAdded, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAbBIPW5RaaBQYBmlXhVVBV0606QKBvJng",
        authDomain: "telega-85cca.firebaseapp.com",
        databaseURL: "https://telega-85cca-default-rtdb.firebaseio.com",
        projectId: "telega-85cca",
        storageBucket: "telega-85cca.firebasestorage.app",
        messagingSenderId: "213088586635",
        appId: "1:213088586635:web:5ee9a8985a9fb5403f7d8e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let xp = parseInt(localStorage.getItem('wp_xp')) || 0;
    let name = localStorage.getItem('worldpixel_name') || "User_" + Math.floor(Math.random() * 999);
    let cx = 0, cy = 0, lastDraw = 0;

    document.getElementById('nick').value = name;
    document.getElementById('nick').onchange = (e) => { name = e.target.value || "Аноним"; localStorage.setItem('worldpixel_name', name); };

    const getRank = (x) => x >= 5000 ? "[ЛЕГЕНДА]" : x >= 300 ? "[МАСТЕР]" : "[НОВИЧОК]";

    // ФУНКЦИЯ УВЕДОМЛЕНИЙ
    function showNotify(text) {
        const container = document.getElementById('notify-container');
        const el = document.createElement('div');
        el.className = 'notify';
        el.innerText = text;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }

    // КВЕСТЫ
    let q = { target: 10, current: 0 };
    window.toggleQ = () => {
        const w = document.getElementById('quest-window');
        w.style.display = w.style.display === 'block' ? 'none' : 'block';
    };

    function updateUI() {
        document.getElementById('bar-fill').style.width = (q.current / q.target * 100) + "%";
        document.getElementById('q-info').innerText = `${q.current} / ${q.target} (Награда: 50 XP)`;
        document.getElementById('stats').innerText = `${cx}, ${cy} | ${xp} XP | ${getRank(xp)}`;
    }

    // ЧАТ
    const cIn = document.getElementById('chat-input-box');
    const cHist = document.getElementById('chat-full-history');
    const cLogs = document.getElementById('chat-logs');

    cIn.onfocus = () => { cHist.style.display = 'block'; cHist.scrollTop = cHist.scrollHeight; };
    cIn.onblur = () => { setTimeout(() => cHist.style.display = 'none', 200); };
    cIn.onkeydown = (e) => {
        if (e.key === 'Enter' && cIn.value.trim()) {
            push(ref(db, 'chat'), { n: name, r: getRank(xp), m: cIn.value, t: serverTimestamp() });
            cIn.value = '';
        }
    };

    onChildAdded(ref(db, 'chat'), (s) => {
        const d = s.val();
        const html = `<div style="font-size:13px;"><span class="tag">${d.r}</span><b>${d.n}:</b> ${d.m}</div>`;
        cHist.innerHTML += html; cHist.scrollTop = cHist.scrollHeight;
        if (d.t > Date.now() - 2000) {
            const p = document.createElement('div'); p.style.background="white"; p.style.padding="5px 10px"; p.style.borderRadius="10px";
            p.innerHTML = html; cLogs.appendChild(p); setTimeout(() => p.remove(), 5000);
        }
    });

    // ОНЛАЙН
    const presRef = ref(db, 'presence/' + Math.random().toString(36).substr(2, 9));
    set(presRef, { n: name }); onDisconnect(presRef).remove();
    onValue(ref(db, 'presence'), s => document.getElementById('count').innerText = s.size || 1);

    // ХОЛСТ
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas'), wctx = world.getContext('2d', { alpha: false });
    const SIZE = 2000; world.width = world.height = SIZE;
    wctx.fillStyle = "white"; wctx.fillRect(0,0,SIZE,SIZE);

    let zoom = 12, off = { x: window.innerWidth/2, y: window.innerHeight/2 };

    onChildAdded(ref(db, 'canvas'), s => { const p = s.val(); wctx.fillStyle = p.c; wctx.fillRect(p.x, p.y, 1, 1); });

    function place(x, y) {
        if (Date.now() - lastDraw < 300 || x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
        lastDraw = Date.now();
        set(ref(db, 'canvas/' + x + '_' + y), { x, y, c: document.getElementById('picker').value });
        xp += 1; q.current++;
        if (q.current >= q.target) {
            xp += 50; q.current = 0; q.target = Math.floor(Math.random()*10)+10;
            showNotify("🏆 Квест выполнен! +50 XP"); // ВМЕСТО ALERT
        }
        localStorage.setItem('wp_xp', xp); updateUI();
    }

    // УПРАВЛЕНИЕ
    let pan = false;
    const getM = (ex, ey) => ({ x: Math.floor((ex - off.x) / zoom + SIZE / 2), y: Math.floor((ey - off.y) / zoom + SIZE / 2) });
    canvas.onmousedown = e => { if (e.button === 0) place(getM(e.clientX, e.clientY).x, getM(e.clientX, e.clientY).y); else pan = true; };
    window.onmousemove = e => { const p = getM(e.clientX, e.clientY); cx = p.x; cy = p.y; updateUI(); if (pan) { off.x += e.movementX; off.y += e.movementY; } };
    window.onmouseup = () => pan = false;
    window.onwheel = e => { const oz = zoom; zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.2 : 0.8), 0.5), 60); off.x = e.clientX - (e.clientX - off.x) * (zoom / oz); off.y = e.clientY - (e.clientY - off.y) * (zoom / oz); };
    window.oncontextmenu = e => e.preventDefault();

    function draw() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "#eef2f6"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.imageSmoothingEnabled = false; ctx.save();
        ctx.translate(off.x, off.y); ctx.scale(zoom, zoom);
        ctx.drawImage(world, -SIZE/2, -SIZE/2); ctx.restore();
        requestAnimationFrame(draw);
    }
    draw(); updateUI();
</script>
</body>
</html>
