<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Pixel - Quest Fixed</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #eef2f6; font-family: 'Segoe UI', sans-serif; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; touch-action: none; background: #fff; }
        
        .ui-element { 
            pointer-events: auto; background: rgba(255, 255, 255, 0.98); 
            backdrop-filter: blur(10px); border-radius: 18px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.4);
        }

        #top-info { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; align-items: center; gap: 10px; padding: 10px 15px; width: 90%; max-width: 420px; justify-content: space-between; }
        #coords { font-size: 13px; font-weight: 700; color: #334155; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; border-radius: 50%; padding: 0; }

        /* ИСПРАВЛЕННОЕ МЕНЮ КВЕСТОВ */
        #quest-container { position: fixed; top: 75px; right: 10px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; }
        #quest-menu { width: 220px; padding: 15px; margin-bottom: 10px; display: none; text-align: left; }
        #quest-toggle { padding: 12px 20px; border-radius: 25px; border: none; background: #10b981; color: white; font-weight: bold; font-size: 13px; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        
        .q-title { font-size: 15px; font-weight: 800; color: #1e293b; display: block; margin-bottom: 4px; }
        .q-desc { font-size: 12px; color: #64748b; line-height: 1.3; }
        .progress-bar { width: 100%; height: 10px; background: #f1f5f9; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #progress-fill { height: 100%; background: #10b981; width: 0%; transition: 0.4s; }
        #q-stats { font-size: 12px; font-weight: 800; color: #10b981; }

        #chat-container { position: fixed; bottom: 15px; left: 10px; z-index: 100; width: calc(100% - 20px); max-width: 320px; pointer-events: none; }
        #chat-messages { height: 110px; overflow: hidden; display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        #chat-input { width: 100%; padding: 14px 22px; border-radius: 30px; border: 1px solid #e2e8f0; outline: none; pointer-events: auto; font-size: 15px; background: white; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        #notify-container { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 1000; pointer-events: none; }
        .notify { background: #fff; padding: 12px 25px; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-weight: 700; border-left: 5px solid #10b981; animation: notifyPop 3.5s forwards; }
        
        @keyframes notifyPop { 0% { opacity: 0; transform: translateY(20px); } 10%, 90% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-20px); } }
        .msg-pop { background: white; padding: 8px 14px; border-radius: 15px; font-size: 13px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); animation: slideIn 0.3s ease-out; width: fit-content; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="top-info" class="ui-element">
    <input type="color" id="colorPicker" value="#000000">
    <div id="coords">Загрузка...</div>
    <input type="text" id="nick-input" placeholder="Ник" style="width: 80px; border: none; background: #f1f5f9; padding: 5px 10px; border-radius: 10px; font-weight: 600;">
    <div style="color: #10b981; font-weight: 800;">● <span id="online">1</span></div>
</div>

<div id="quest-container">
    <div id="quest-menu" class="ui-element">
        <span class="q-title">🎯 Задание: Маляр</span>
        <span class="q-desc">Рисуй любые пиксели на холсте, чтобы получить опыт!</span>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div id="q-stats">0 / 10 (Награда: 50 XP)</div>
    </div>
    <button id="quest-toggle" onclick="toggleQuests()">📜 ЗАДАНИЕ</button>
</div>

<div id="notify-container"></div>

<div id="chat-container">
    <div id="chat-messages"></div>
    <input type="text" id="chat-input" placeholder="Напиши сообщение...">
</div>

<canvas id="canvas"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbBIPW5RaaBQYBmlXhVVBV0606QKBvJng",
        authDomain: "telega-85cca.firebaseapp.com",
        databaseURL: "https://telega-85cca-default-rtdb.firebaseio.com",
        projectId: "telega-85cca",
        storageBucket: "telega-85cca.firebasestorage.app",
        messagingSenderId: "213088586635",
        appId: "1:213088586635:web:5ee9a8985a9fb5403f7d8e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userXP = parseInt(localStorage.getItem('wp_xp')) || 0;
    let userName = localStorage.getItem('worldpixel_name') || "Художник_" + Math.floor(Math.random() * 99);
    let curX = 0, curY = 0, lastDraw = 0;
    const W_SIZE = 2000;

    document.getElementById('nick-input').value = userName;
    document.getElementById('nick-input').onchange = (e) => {
        userName = e.target.value || "Аноним";
        localStorage.setItem('worldpixel_name', userName);
    };

    function showNotify(text) {
        const container = document.getElementById('notify-container');
        const el = document.createElement('div');
        el.className = 'notify'; el.innerText = text;
        container.appendChild(el); setTimeout(() => el.remove(), 3500);
    }

    // ЧАТ
    const chatIn = document.getElementById('chat-input');
    const chatMsgs = document.getElementById('chat-messages');

    chatIn.onkeydown = (e) => {
        if (e.key === 'Enter' && chatIn.value.trim()) {
            db.ref('chat').push({ name: userName, msg: chatIn.value, t: firebase.database.ServerValue.TIMESTAMP });
            chatIn.value = ''; chatIn.blur();
        }
    };

    db.ref('chat').limitToLast(5).on('child_added', (s) => {
        const d = s.val();
        if (d.t < Date.now() - 5000) return;
        const pop = document.createElement('div');
        pop.className = 'msg-pop'; pop.innerHTML = `<b>${d.name}:</b> ${d.msg}`;
        chatMsgs.appendChild(pop); setTimeout(() => pop.remove(), 6000);
    });

    // КВЕСТЫ
    let quest = { progress: 0, target: 10 };
    function toggleQuests() {
        const m = document.getElementById('quest-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function updateUI() {
        document.getElementById('coords').innerText = `${curX}, ${curY} | ${userXP} XP`;
        document.getElementById('progress-fill').style.width = (quest.progress / quest.target * 100) + "%";
        document.getElementById('q-stats').innerText = `${quest.progress} / ${quest.target} (Награда: 50 XP)`;
    }

    // ОНЛАЙН
    const myRef = db.ref('presence').push();
    myRef.set({ name: userName }); myRef.onDisconnect().remove();
    db.ref('presence').on('value', s => document.getElementById('online').innerText = s.numChildren());

    // ХОЛСТ
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d', { alpha: false });
    const world = document.createElement('canvas'), wctx = world.getContext('2d', { alpha: false });
    world.width = world.height = W_SIZE;
    wctx.fillStyle = "white"; wctx.fillRect(0,0,W_SIZE,W_SIZE);

    let zoom = 10, offset = { x: window.innerWidth/2, y: window.innerHeight/2 };

    db.ref('canvas').on('child_added', s => {
        const p = s.val(); wctx.fillStyle = p.color; wctx.fillRect(p.x, p.y, 1, 1);
    });

    function drawPixel(x, y) {
        if (Date.now() - lastDraw < 300 || x < 0 || x >= W_SIZE || y < 0 || y >= W_SIZE) return;
        lastDraw = Date.now();
        db.ref('canvas/' + x + '_' + y).set({ x, y, color: document.getElementById('colorPicker').value });
        
        userXP++;
        quest.progress++;
        if (quest.progress >= quest.target) {
            userXP += 50; 
            quest.progress = 0;
            showNotify("🏆 Квест выполнен! +50 XP");
        }
        localStorage.setItem('wp_xp', userXP);
        updateUI();
    }

    // УПРАВЛЕНИЕ (МЫШЬ + ТАЧ)
    let isPan = false, lastTouch = null, startDist = 0;
    const getP = (cx, cy) => ({
        x: Math.floor((cx - offset.x) / zoom + W_SIZE / 2),
        y: Math.floor((cy - offset.y) / zoom + W_SIZE / 2)
    });

    canvas.onmousedown = e => { if(e.button === 0) drawPixel(getP(e.clientX, e.clientY).x, getP(e.clientX, e.clientY).y); else isPan = true; };
    window.onmousemove = e => { 
        const p = getP(e.clientX, e.clientY); curX = p.x; curY = p.y; updateUI();
        if(isPan) { offset.x += e.movementX; offset.y += e.movementY; }
    };
    window.onmouseup = () => isPan = false;
    window.onwheel = e => {
        const oldZ = zoom; zoom = Math.min(Math.max(zoom * (e.deltaY < 0 ? 1.1 : 0.9), 0.5), 60);
        offset.x = e.clientX - (e.clientX - offset.x) * (zoom / oldZ);
        offset.y = e.clientY - (e.clientY - offset.y) * (zoom / oldZ);
    };

    canvas.ontouchstart = e => {
        if (e.touches.length === 1) {
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            const p = getP(lastTouch.x, lastTouch.y);
            setTimeout(() => { if(!isPan) drawPixel(p.x, p.y); }, 60);
        } else if (e.touches.length === 2) {
            startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    };

    canvas.ontouchmove = e => {
        e.preventDefault();
        if (e.touches.length === 1 && lastTouch) {
            isPan = true;
            offset.x += e.touches[0].clientX - lastTouch.x;
            offset.y += e.touches[0].clientY - lastTouch.y;
            lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const oldZ = zoom;
            zoom = Math.min(Math.max(zoom * (dist / startDist), 0.5), 60);
            offset.x = midX - (midX - offset.x) * (zoom / oldZ);
            offset.y = midY - (midY - offset.y) * (zoom / oldZ);
            startDist = dist;
        }
        const p = getP(e.touches[0].clientX, e.touches[0].clientY);
        curX = p.x; curY = p.y; updateUI();
    };

    canvas.ontouchend = () => { isPan = false; lastTouch = null; };

    function render() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ctx.fillStyle = "#eef2f6"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.imageSmoothingEnabled = false; ctx.save();
        ctx.translate(offset.x, offset.y); ctx.scale(zoom, zoom);
        ctx.drawImage(world, -W_SIZE/2, -W_SIZE/2); ctx.restore();
        requestAnimationFrame(render);
    }
    render(); updateUI();
</script>
</body>
</html>
